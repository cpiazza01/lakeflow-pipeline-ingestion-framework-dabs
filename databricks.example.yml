bundle:
  name: dlt-ingestion-framework

# Files are deployed to ${workspace.root_path}/files/...
# Notebooks are deployed to ${workspace.root_path}/...
workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

# ---------------------------------------------------------------------------
# Variables
# Set defaults here; override per target below.
# ---------------------------------------------------------------------------
variables:

  # --- Infrastructure (required per environment) ---
  catalog:
    description: Unity Catalog name where the DLT pipeline creates tables and stores event logs.

  warehouse_id:
    description: >
      SQL Warehouse ID used by the tagging and expectations report job tasks.
      Find this in Databricks UI: SQL > SQL Warehouses > (your warehouse) > Connection details.

  # --- Pipeline schema locations ---
  pipeline_schema:
    description: Schema within 'catalog' where the DLT pipeline is registered.
    default: temp_objects

  audit_schema:
    description: Schema within 'catalog' where the pipeline event log table is stored.
    default: audit

  # --- Job performance ---
  performance_target:
    description: >
      Job performance target. PERFORMANCE_OPTIMIZED for faster startup;
      STANDARD for cost-efficient runs.
    default: STANDARD

# ---------------------------------------------------------------------------
# Generated resource files are included here.
# Run `lakeflow-generate --config pipeline_config.yaml --env <env>` first.
# ---------------------------------------------------------------------------
include:
  - resources/*.yml

# ---------------------------------------------------------------------------
# Targets (environments)
# Each target overrides the variables above for that environment.
# ---------------------------------------------------------------------------
targets:

  dev:
    default: true
    variables:
      catalog: your_dev_catalog       # replace with your dev catalog
      warehouse_id: your_warehouse_id # replace with your warehouse ID

  test:
    variables:
      catalog: your_test_catalog
      warehouse_id: your_warehouse_id

  prod:
    variables:
      catalog: your_prod_catalog
      warehouse_id: your_warehouse_id
