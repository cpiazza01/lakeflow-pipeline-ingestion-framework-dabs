# ==============================================================================
# pipeline_config.yaml — DLT Ingestion Framework (DABs)
#
# USAGE:
#   Copy this file to pipeline_config.yaml, fill in your values, then run:
#     python lakeflow-generate --config pipeline_config.yaml --env dev
#
# lakeflow-generate substitutes ${env} in all string values before parsing,
# so you can use ${env} in S3 paths, catalog names, etc.
# ==============================================================================

# ---------------------------------------------------------------------------
# Pipeline identity
# These values are embedded into SQL TBLPROPERTIES for governance tagging.
# ---------------------------------------------------------------------------
pipeline_name: my_pipeline
project: my_project
github_repo: github.com/my-org/my-repo

# ---------------------------------------------------------------------------
# Notifications
# ---------------------------------------------------------------------------
email_notifications:
  - user@example.com

email_on_pipeline_success: true   # send email when DLT pipeline update succeeds
email_on_job_success: true        # send email when the orchestration job succeeds

# ---------------------------------------------------------------------------
# Optional: separate email list for the expectations report task
# Defaults to email_notifications when null.
# ---------------------------------------------------------------------------
expectations_report_emails: null

# ---------------------------------------------------------------------------
# Optional features
# ---------------------------------------------------------------------------
enable_expectations_report: false  # set true when at least one pipeline has expectations

trigger_downstream_job: false
downstream_job_id: null            # required when trigger_downstream_job is true
downstream_job_parameters: {}      # key/value pairs passed to the downstream job

# ---------------------------------------------------------------------------
# Scheduling — mutually exclusive with file_trigger
# ---------------------------------------------------------------------------
schedule: null
# schedule:
#   quartz_cron_expression: "0 0 12 * * ?"   # daily at noon
#   timezone_id: America/New_York
#   pause_status: UNPAUSED                   # or PAUSED

file_trigger: null
# file_trigger:
#   url: s3://my-bucket-${env}/landing/
#   wait_after_last_change_seconds: 300
#   min_time_between_triggers_seconds: 3600

# ---------------------------------------------------------------------------
# Access control
# pipeline_access_group: dev env grants CAN_MANAGE; other envs get CAN_VIEW (pipeline)
#                        and CAN_MANAGE_RUN (job)
# service_principal_job_runners: granted CAN_MANAGE_RUN on the job so upstream
#                                jobs/automation can trigger it
# ---------------------------------------------------------------------------
pipeline_access_group: null          # e.g. my-project-readers
service_principal_job_runners: []    # e.g. [my-service-principal]

# ---------------------------------------------------------------------------
# Additional Unity Catalog tags applied to all tables (Bronze, Silver, Quarantine)
# Framework-managed tags (Project, GitHubRepo, FrameworkUsed, etc.) always win.
# ---------------------------------------------------------------------------
tags: {}
# tags:
#   CostCenter: "12345"
#   DataDomain: "Finance"

# ---------------------------------------------------------------------------
# Schema overrides (also configurable as DABs variables in databricks.yml)
# ---------------------------------------------------------------------------
audit_schema: audit            # where the DLT event log table lives

# ==============================================================================
# Pipeline Definitions
# ==============================================================================

pipelines:

  # --------------------------------------------------------------------------
  # 1. SCD TYPE 1 (UPSERT) — Parquet source with expectations and column masks
  # --------------------------------------------------------------------------
  - bronze_table_name: "stage_adobe.users_current"
    silver_table_name: "catalog.core_adobe.users_current"
    table_type: "scd1"
    source_path: "s3://my-bucket-${env}/adobe/users"
    source_file_type: "parquet"
    description: "Latest user profiles — overwrites on change."
    cdc_conf:
      keys: ["userId"]
      sequence_by: "lastUpdatedTs"
      apply_as_delete: "operation = 'DELETE'"   # optional hard-delete support
    columns:
      - source: "userId"
        target: "userId"
        target_datatype: "STRING"
        comment: "Unique User Identifier"
      - source: "email"
        target: "email"
        target_datatype: "STRING"
        comment: "User email (masked)"
      - source: "lastUpdatedTs"
        target: "lastUpdatedTs"
        target_datatype: "TIMESTAMP"
        comment: "CDC sequence column"
    expectations:
      - name: "valid_user_id"
        condition: "userId IS NOT NULL"
        action: "FAIL UPDATE"
    column_masks:
      - column: email
        function: catalog.masking.mask_email
    # row_filter:
    #   function: catalog.masking.filter_by_region
    #   on_columns: [region]

  # --------------------------------------------------------------------------
  # 2. SCD TYPE 2 (HISTORY) — CSV source with pipe delimiter
  # --------------------------------------------------------------------------
  - bronze_table_name: "stage_adobe.subscription_history"
    silver_table_name: "catalog.core_adobe.subscription_history"
    table_type: "scd2"
    description: "Full subscription history with change tracking."
    source_path: "s3://my-bucket-${env}/adobe/subs"
    source_file_type: "csv"
    csv_options:
      header: true
      delimiter: "|"
      mode: "PERMISSIVE"
      bad_records_path: "/Volumes/catalog/volumes/my-volume/subs_bad_records"
    cdc_conf:
      keys: ["subId"]
      sequence_by: "eventTime"
    columns:
      - source: "subscription_id"
        target: "subId"
        target_datatype: "STRING"
        comment: "Subscription ID"
      - source: "status"
        target: "status"
        target_datatype: "STRING"
        comment: "Active, Cancelled, etc."
      - source: "eventTime"
        target: "eventTime"
        target_datatype: "TIMESTAMP"
        comment: "CDC sequence column"
    expectations: []

  # --------------------------------------------------------------------------
  # 3. STREAMING TABLE — append-only event data
  # --------------------------------------------------------------------------
  - bronze_table_name: "stage_adobe.marketing_events"
    silver_table_name: "catalog.core_adobe.marketing_events"
    table_type: "streaming"
    description: "Append-only marketing event log."
    source_path: "s3://my-bucket-${env}/adobe/events"
    source_file_type: "parquet"
    columns:
      - source: "eventId"
        target: "eventId"
        target_datatype: "STRING"
        comment: "Unique event ID"
      - source: "userId"
        target: "userId"
        target_datatype: "STRING"
        comment: "Associated user"
      - source: "eventTimestamp"
        target: "eventTimestamp"
        target_datatype: "TIMESTAMP"
        comment: "When the event occurred"
    expectations: []

  # --------------------------------------------------------------------------
  # 4. MATERIALIZED VIEW — with WHERE and QUALIFY for deduplication
  # --------------------------------------------------------------------------
  - bronze_table_name: "stage_adobe.daily_active_users"
    silver_table_name: "catalog.core_adobe.daily_active_users"
    table_type: "materialized"
    source_path: "s3://my-bucket-${env}/adobe/usage_logs"
    source_file_type: "parquet"
    description: "One row per user per day — latest event wins."
    where_clause: "event_date >= '2024-01-01'"
    qualify_clause: "ROW_NUMBER() OVER(PARTITION BY userId ORDER BY eventTimestamp DESC) = 1"
    columns:
      - source: "userId"
        target: "userId"
        target_datatype: "STRING"
        comment: "User ID"
      - source: "event_date"
        target: "eventDate"
        target_datatype: "DATE"
        comment: "Activity date"
      - source: "eventTimestamp"
        target: "eventTimestamp"
        target_datatype: "TIMESTAMP"
        comment: "Latest event timestamp for this user/date"
    expectations:
      - name: "recent_data"
        condition: "eventDate > '2023-01-01'"
        action: "WARN"

  # --------------------------------------------------------------------------
  # 5. EXCEL — multi-sheet ingestion (UNION ALL across sheets)
  # --------------------------------------------------------------------------
  - bronze_table_name: "stage_finance.monthly_report"
    silver_table_name: "catalog.core_finance.monthly_report"
    table_type: "streaming"
    description: "Monthly finance report ingested from multi-sheet Excel."
    source_path: "s3://my-bucket-${env}/finance/monthly_reports"
    source_file_type: "excel"
    excel_options:
      sheet_names:
        - "January"
        - "February"
        - "March"
      headerRows: 0
      inferSchema: false
    columns:
      - source: "ReportDate"
        target: "reportDate"
        target_datatype: "DATE"
        comment: "Report date"
      - source: "Amount"
        target: "amount"
        target_datatype: "DECIMAL(18,2)"
        comment: "Dollar amount"
    expectations: []

  # --------------------------------------------------------------------------
  # 6. BRONZE REUSE — skip bronze ingestion, build Silver from an existing table
  # --------------------------------------------------------------------------
  - reuse_bronze: true
    bronze_table_name: "stage_adobe.users_current"   # must already exist
    silver_table_name: "catalog.core_adobe.users_vip"
    table_type: "materialized"
    description: "VIP users derived from the existing users bronze table."
    where_clause: "tier = 'VIP'"
    columns:
      - source: "userId"
        target: "userId"
        target_datatype: "STRING"
        comment: "User ID"
      - source: "tier"
        target: "tier"
        target_datatype: "STRING"
        comment: "Always VIP in this table"
    expectations: []
